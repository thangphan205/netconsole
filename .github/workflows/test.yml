name: Test

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create .env for CI
        run: |
          cat > .env << 'EOF'
          DOMAIN=localhost
          ENVIRONMENT=local
          PROJECT_NAME=NetConsole
          STACK_NAME=netconsole
          BACKEND_CORS_ORIGINS=http://localhost
          SECRET_KEY=ci-test-secret-key-not-for-production
          FIRST_SUPERUSER=admin@example.com
          FIRST_SUPERUSER_PASSWORD=changethis
          SMTP_HOST=
          SMTP_USER=
          SMTP_PASSWORD=
          EMAILS_FROM_EMAIL=info@example.com
          POSTGRES_SERVER=db
          POSTGRES_PORT=5432
          POSTGRES_DB=app
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=changethis
          SENTRY_DSN=
          TIMEZONE=UTC
          DOCKER_IMAGE_BACKEND=backend
          DOCKER_IMAGE_FRONTEND=frontend
          TAG=latest
          CREDENTIAL_ENCRYPTION_KEY=d3G4FDS-ga_x77BuFR-YW_IJ0I0EZHOW5i2QrCG8MwM=
          USERS_OPEN_REGISTRATION=False
          EOF

      - run: docker compose build
      - run: docker compose down -v --remove-orphans
      - run: docker compose up -d
      - name: Lint
        run: docker compose exec -T backend bash /app/scripts/lint.sh
      - name: Type check
        run: docker compose exec -T backend mypy /app
      - name: Run tests
        run: docker compose exec -T backend bash /app/tests-start.sh "Coverage for ${{ github.sha }}"
      - run: docker compose down -v --remove-orphans
      - name: Store coverage files
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: backend/htmlcov

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install security tools
        run: pip install bandit detect-secrets gibberish-detector

      - name: Bandit SAST
        run: bandit -r backend/app -ll -x backend/app/tests

      - name: Secrets scan
        run: detect-secrets scan --baseline .secrets.baseline

  dependency-review:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  # https://github.com/marketplace/actions/alls-green#why
  alls-green:  # This job does nothing and is only used for the branch protection
    if: always()
    needs:
      - test
      - security
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
